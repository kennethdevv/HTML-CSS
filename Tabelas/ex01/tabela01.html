<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabelas</title>

    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
        }

        table{
            height: 400px;
            width: 400px;
            border: 1px solid black;
            border-collapse: collapse; /*Faz com que as bordas da tabela fiquem unidas, sem espaço entre elas*/
        }

        td{
            vertical-align: top; /*Alinha o texto verticalmente da célula*/
            text-align: center; /*Alinha o texto horizontalmente da célula*/
            border: 1px solid black;
            padding: 10px;
        }
        
        

    </style>

</head>
<body>
    <h1>Minha primeira Tabela</h1>

    <!--
    HIERARQUIA DE TABELAS (SIMPLES)
    TABLE=tabelas
    TABLE ROW=linhas de tabela : TR
    TABLE HEADER=CABEÇALHO de tabela:TH
    TABLE DATA=DADOS de tabela:TD
    -->

    <table>
        <tr><!--Primeira linha-->
            <td>A1</td>
            <td>B1</td>
            <td>C1</td>
        </tr>

        <tr><!--Segunda linha-->
            <td>A2</td>
            <td>B2</td>
            <td>C2</td>

        </tr>

            <tr><!--Terceira linha-->
                <td>A3</td>
                <td>B3</td>
                <td>C3</td>
            </tr>

            <tr><!--Quarta linha-->
                <td>A4</td>
                <td>B4</td>
                <td>C4</td>
            </tr>

    </table>

    
</body>
</html>
