<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabelas</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            
        }

        table {
            width: 500px;
            border-collapse: collapse;
        }

        caption{
            font-size: 1.3em;
            font-weight: bolder;
            padding: 8px;
        }

        th, td{
            border: 1px solid #000;
            padding: 8px;
            
        }

        col.nome {
            background-color: #cc3535;
        }

        col.cgrupo{
            background-color: yellow;
        }

    </style>
</head>
<body>
    <h1>Exercicio de Tabelas</h1>

    <table>
        <colgroup>
            <col class="nome">
            <col class="cgrupo" span="2">
            
            <col class="profissao">
        </colgroup>

        <caption>Cadastro </caption>
        <tr>
            <th scope="col">Nome</th>
            <th scope="col">Idade</th>
            <th scope="col">Sexo</th>
            <th scope="col">Profissão</th>
        </tr>

        <tr>
            <td>João</td>
            <td>25</td>
            <td>Masculino</td>
            <td>Engenheiro</td>
        </tr>

        <tr>
            <td>Maria</td>
            <td>30</td>
            <td>Feminino</td>
            <td>Médica</td>
        </tr>

        <tr>
            <td>Pedro</td>
            <td>35</td>
            <td>Masculino</td>
            <td>Professor</td>
        </tr>

        <tr>
            <td>Ana</td>
            <td>28</td>
            <td>Feminino</td>
            <td>Advogada</td>
        </tr>
        

        
    </table>
    
</body>
</html>
