<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario</title>
</head>
<body>
    <h1>Exemplo de fomrulario</h1>
    <form action="cadastro.php" method="get" autocomplete="on">

        <p>
            <label for="iest">Estado</label>
            <select name="estado" id="iest">
                <option value="" selected>---ESCOLHA---</option>
                <optgroup label="Regiao Sudeste">
                    <option value="sp">sao paulo</option>
                    <option value="mg">minas gerais</option>
                    <option value="rj">rio de janeiro</option>
                </optgroup>

                <optgroup label="Regiao Nordeste">
                    <option value="ma">maranhao</option>
                    <option value="pe">pernambuco</option>
                    <option value="rn">rio grande do sul</option>
                </optgroup>
            </select>
        </p>

        <p>
            <label for="iprof">Profissao</label>
            <input type="text" name="prof" id="iprof" list="istprof">
            <datalist id="istprof">
                <option value="prof">Professor</option>
                <option value="adm">Administrador</option>
                <option value="dev">Desenvolvedor</option>
                <option value="cont">Contabilidade</option>
                
            </datalist>
        </p>

        <p>
            <label for="imsg">Mensagem:</label> <br>
            <textarea name="msg" id="imsg" cols="30" rows="10"> </textarea>
        </p>
        <!--TAMBEM UTILIZAR O METHOD POST PQ O GET TEM LIMITAÇÃO-->
        
        <p>
            <input type="submit" value="Enviar">
            <input type="reset" value="Limpar">
        </p>
    </form>
    
</body>
</html>
