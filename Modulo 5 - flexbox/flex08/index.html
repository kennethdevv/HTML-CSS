<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flex Box</title>
    <style>
        .container {
            display: flex;
            background-color: aqua;
            flex-flow: row wrap;
            
        }

        .item {
            background-color: #59ff5e;
            border: 1px solid black;
            flex-basis: 200px;
            text-align: center;

        }

        #cxa {
            flex-shrink: 1;
            flex-grow: 0;
        }
        #cxb {
            flex-shrink: 1;
            flex-grow: 2;
        }
        #cxc {
            flex-shrink: 1;
            flex-grow: 4;
        }
    </style>
</head>
<body>
    <div class="container">
        <div id="cxa" class="item">1</div>
        <div id="cxb" class="item">2</div>
        <div id="cxc" class="item">3</div>
        <div class="item">4</div>
        <div class="item">5</div>
    </div>
    
</body>
</html>
