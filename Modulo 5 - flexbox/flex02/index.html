<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flex Box</title>
    <style>
        .container {
            display: flex;
            background-color: aqua;
            flex-direction: row;
            flex-wrap: wrap;
            flex-flow: row wrap;
            
        }

        .item {
            background-color: #59ff5e;
            border: 1px solid black;
            flex: auto;
            text-align: center;

        }
    </style>
</head>
<body>
    <div class="container">
        <div class="item"> Exemplo de bloco 1</div>
        <div class="item"> Exemplo de bloco 2</div>
        <div class="item"> Exemplo de bloco 3</div>
        <div class="item"> Exemplo de bloco 4</div>
        <div class="item"> Exemplo de bloco 5</div>
        <div class="item"> Exemplo de bloco 6</div>
        <div class="item"> Exemplo de bloco 7</div>
    </div>
    
</body>
</html>
